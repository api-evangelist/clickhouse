name: ClickHouse
description: ClickHouse is a fast open-source column-oriented database management system that allows generating analytical data reports in real-time using SQL queries.
image: https://clickhouse.com/images/ch-logo.svg
url: https://clickhouse.com
created: '2024-01-01'
modified: '2024-01-01'
tags:
- Database
- Analytics
- OLAP
- SQL
- Real-time
- Column-oriented
apis:
- name: ClickHouse HTTP Interface
  description: HTTP interface for executing queries and managing ClickHouse database
  baseURL: https://clickhouse.example.com:8123
  humanURL: https://clickhouse.com/docs/en/interfaces/http
  properties:
  - type: Documentation
    url: https://clickhouse.com/docs/en/interfaces/http
  - type: OpenAPI
    url: https://clickhouse.com/docs/en/interfaces/http
  tags:
  - HTTP
  - REST
  - Queries
- name: ClickHouse Native TCP Interface
  description: Native protocol for client-server communication with optimal performance
  baseURL: clickhouse.example.com:9000
  humanURL: https://clickhouse.com/docs/en/interfaces/tcp
  properties:
  - type: Documentation
    url: https://clickhouse.com/docs/en/interfaces/tcp
  tags:
  - TCP
  - Native
