  properties:
  - type: Documentation
    url: https://clickhouse.com/docs/en/interfaces/postgresql
  tags:
  - PostgreSQL
  - Compatibility
- name: ClickHouse gRPC Interface
  description: gRPC interface for efficient binary communication
  baseURL: clickhouse.example.com:9100
